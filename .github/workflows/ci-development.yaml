name: CI-DEVELOPMENT

on:
  push:
    branches: [develop]

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build & Test
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SHOW_SQL: true
          DB_DDL_AUTO: "update"
          DB_DIALECT: "org.hibernate.dialect.MySQL8Dialect"
          DB_FORMAT_SQL: true
          BATCH_JOB_ENABLED: true
        run: mvn clean verify

      - name: Build Docker image
        run: docker build -t 100.98.0.126:8082/dev/backend-app:${{ github.sha }} .

      - name: Login Nexus
        run: docker login 100.98.0.126:8082 -u ${{ secrets.NEXUS_USER }} -p ${{ secrets.NEXUS_PASS }}

      - name: Push image
        run: docker push 100.98.0.126:8082/dev/backend-app:${{ github.sha }}

      - name: Trigger CD
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
          https://api.github.com/repos/hakimsa/helm-releases/dispatches \
          -d '{"event_type":"deploy-dev","client_payload":{"image":"${{ github.sha }}"}}'