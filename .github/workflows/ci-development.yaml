name: CI-DEVELOPMENT

on:
  push:
    branches:
        - develop   
  pull_request:
      branches:
        - develop
jobs:

  ci-wrapper:
    runs-on: ubuntu-latest
    environment: dev                 
    outputs:
      dockerhub-username: ${{ steps.vars.outputs.dockerhub-username }}
    steps:
      - name: Expose secrets as outputs
        id: vars
        run: echo "ready=true" >> $GITHUB_OUTPUT

  ci:
    needs: ci-wrapper
    uses: hakimsa/shared-workflows/.github/workflows/reusable-ci.yml@main
    with:
      docker-image-name: backend-mgt
      setup-java: true
      java-version: '17'
      install-command: mvn clean install -DskipTests
      build-command: mvn package -DskipTests
     # lint-command: mvn checkstyle:check
      test-command: mvn test
      artifact-path: target/
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}  # heredado del entorno dev via needs
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      
  deploy-staging:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    uses: hakimsa/shared-workflows/.github/workflows/reusable-cd.yml@main
    with:
      environment: staging
      deploy-tool: helm
      image-name: hakimsamouh/backend-app
      image-tag: ${{ github.sha }}
      helm-release-name: backend-app-staging
      helm-namespace: staging
      helm-values-file: dev/values.yaml        #  ruta dentro de helm-releases
      artifact-name: ${{ needs.ci.outputs.artifact-name }}
    secrets: inherit

  deploy-production:
    needs: ci
    if: github.ref == 'refs/heads/main'
    uses: hakimsa/shared-workflows/.github/workflows/reusable-cd.yml@main
    with:
      environment: production
      deploy-tool: helm
      image-name: hakimsamouh/backend-app
      image-tag: ${{ github.sha }}
      helm-release-name: backend-app
      helm-namespace: production
      helm-values-file: production/values.yaml     #  ruta dentro de helm-releases
      artifact-name: ${{ needs.ci.outputs.artifact-name }}
    secrets: inherit
