name: CI-DEVELOPMENT

on:
  push:
    branches:
        - develop   
  pull_request:
      branches:
        - develop
jobs:
  set-environment:
    runs-on: ubuntu-latest
    environment: dev                  # 👈 aquí sí está permitido
    steps:
      - run: echo "Entorno configurado"
  ci:
    needs: set-environment
    uses: hakimsa/shared-workflows/.github/workflows/reusable-ci.yml@main
    with:
      setup-java: true
      java-version: '17'
      install-command: mvn clean install -DskipTests
      artifact-path: dist/

     # lint-command: mvn checkstyle:check          # activa lint (y desbloquea test)
      test-command: mvn test                       # activa test
      build-command: mvn package -DskipTests
      docker-image-name: 'backend-mgt:latest'
      dockerfile-path: Dockerfile    
      
    secrets: inherit
