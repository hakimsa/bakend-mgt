name: CI-DEVELOPMENT

on:
  push:
    branches:
        - develop   
  pull_request:
      branches:
        - develop
jobs:

  ci:
    uses: hakimsa/shared-workflows/.github/workflows/reusable-ci.yml@main
    with:
      setup-java: true
      java-version: '17'
      install-command: mvn clean install -DskipTests
      artifact-path: dist/
    secrets: inherit
