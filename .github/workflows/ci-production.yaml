name: CI-PRODUCTION
on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: hakimsa/shared-workflows/.github/workflows/reusable-ci.yml@main
    with:
      docker-image-name: backend-mgt
      setup-java: true
      java-version: '17'
      environment: "production"
      image-tag: ${{ github.ref_name }}
      install-command: mvn clean install -DskipTests
      build-command: mvn package -DskipTests
      test-command: mvn test
      artifact-path: target/
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-production:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    uses: hakimsa/shared-workflows/.github/workflows/reusable-cd.yml@main
    with:
      runner: self-hosted
      environment: production
      deploy-tool: helm
      image-name: hakimsamouh/backend-mgt
      image-tag: ${{ github.ref_name }}
      helm-charts-repo: hakimsa/helm-releases
      helm-charts-ref: main
      helm-release-name: backend-app-production
      helm-namespace: production
      helm-values-file: values.yaml
      artifact-name: ${{ needs.ci.outputs.artifact-name }}
    secrets:
      KUBE_CONFIG: ${{ secrets.KUBECONFIG_STAGING }}
      CHARTS_TOKEN: ${{ secrets.GH_TOKEN }}
      DB_URL: ${{ secrets.DB_URL }}                      
      DB_USER: ${{ secrets.DB_USER }}               
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}             
      SECURITY_PASSWORD: ${{ secrets.SECURITY_PASSWORD }}
    
    