name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main
      
    types: [opened, synchronize, reopened]

jobs:
  validation:
    uses: hakimsa/shared-workflows/.github/workflows/reusable-ci.yml@main
    with:
      setup-java: true
      java-version: '17'
      environment: dev
      install-command: mvn clean install -DskipTests
      lint-command: mvn checkstyle:check
      test-command: mvn test
      build-command: mvn package -DskipTests
      artifact-path: target/
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  automerge:
    needs: validation
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - name: Auto merge PR
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          MERGE_METHOD: squash
          MERGE_COMMIT_TITLE: "{pullRequest.title}"